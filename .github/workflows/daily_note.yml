name: 📓 Nota Diária no Notesnook

on:
  schedule:
    # 7:00 AM BRT (America/Fortaleza) = 10:00 UTC
    # Fortaleza não adota horário de verão, então é sempre UTC-3
    - cron: "0 10 * * *"

  # Permite executar manualmente pela aba Actions do GitHub
  workflow_dispatch:

jobs:
  send-daily-note:
    name: Enviar Nota Diária
    runs-on: ubuntu-latest

    steps:
      - name: 📅 Gerar payload da nota (via Python)
        run: |
          python3 << 'PYEOF'
          import json, os, datetime, zoneinfo

          tz = zoneinfo.ZoneInfo("America/Fortaleza")
          now = datetime.datetime.now(tz)

          WEEKDAYS = ["Segunda-feira","Terça-feira","Quarta-feira",
                      "Quinta-feira","Sexta-feira","Sábado","Domingo"]
          MONTHS   = ["janeiro","fevereiro","março","abril","maio","junho",
                      "julho","agosto","setembro","outubro","novembro","dezembro"]

          weekday  = WEEKDAYS[now.weekday()]
          date_str = f"{now.day} de {MONTHS[now.month - 1]} de {now.year}"
          title    = f"{weekday}, {date_str}"

          PROMPTS = [
              # 0 – Segunda
              f"""<p>☀️ <em>Bom dia.</em> Uma nova página em branco espera por você — sem julgamentos, sem pressão.
Pode ser uma linha só. Pode ser um rabisco de ideia. O que está rolando pela sua cabeça agora?</p>
<h2>Comece aqui 👇</h2><p><br></p>
<h2>Reflexão do dia</h2><p>Uma coisa que quero lembrar amanhã:</p><p><br></p>
<h2>Algo que aprendi ou percebi</h2><p><br></p>""",

              # 1 – Terça
              f"""<p>📝 <em>Você abriu esse app por alguma razão.</em> Escrever é só conversar com você mesmo —
sem filtro, sem autocorreção emocional. O que está ocupando espaço na sua cabeça hoje?</p>
<h2>Despejo mental 🧠</h2><p><br></p>
<h2>O que está indo bem?</h2><p><br></p>
<h2>O que pode melhorar?</h2><p><br></p>""",

              # 2 – Quarta
              f"""<p>🌊 <em>Três minutos. Só isso.</em> Abra o teclado e deixa fluir — sem apagar, sem reescrever.
Pensamento cru, direto.</p>
<h2>Escreva livremente 🖊️</h2><p><br></p>
<h2>Uma palavra que define seu dia até agora</h2><p><br></p>
<h2>Uma coisa que você quer fazer antes de dormir</h2><p><br></p>""",

              # 3 – Quinta
              f"""<p>💡 <em>Ideias não documentadas são ideias perdidas.</em> Que faísca passou pela sua mente
nos últimos dias e você não anotou? Hora de resgatar.</p>
<h2>Ideias soltas 💭</h2><p><br></p>
<h2>Projeto ou plano que quero avançar</h2><p><br></p>
<h2>Uma pergunta que me intriga ultimamente</h2><p><br></p>""",

              # 4 – Sexta
              f"""<p>🔥 <em>Ontem já foi, amanhã é incerto — mas agora você está aqui.</em> O que está acontecendo
de verdade na sua vida? Não o que você posta, o que você realmente sente.</p>
<h2>Honestidade radical ✍️</h2><p><br></p>
<h2>O que estou evitando pensar?</h2><p><br></p>
<h2>O que me deixaria orgulhoso(a) daqui a uma semana?</h2><p><br></p>""",

              # 5 – Sábado
              f"""<p>🗺️ <em>Todo grande projeto começa numa anotação bagunçada.</em> O que você está construindo —
ou querendo construir — que ainda não saiu do papel?</p>
<h2>Construindo algo 🏗️</h2><p><br></p>
<h2>Próximos passos concretos</h2><p><br></p>
<h2>O que me trava?</h2><p><br></p>""",

              # 6 – Domingo
              f"""<p>🌱 <em>Crescimento não aparece nos espelhos, aparece nas anotações.</em> Compare você de hoje
com você de seis meses atrás. O que mudou?</p>
<h2>Evolução pessoal 📈</h2><p><br></p>
<h2>Hábito que estou tentando criar ou largar</h2><p><br></p>
<h2>Uma coisa que aprendi sobre mim mesmo(a) recentemente</h2><p><br></p>""",
          ]

          prompt  = PROMPTS[now.weekday()]
          content = (
              f"<h1>📓 {weekday}</h1>"
              f"<p><strong>{date_str}</strong></p>"
              f"<hr>"
              f"{prompt}"
              f"<hr>"
              f'<p><em>\u201cA vida n\u00e3o examinada n\u00e3o vale a pena ser vivida.\u201d \u2014 S\u00f3crates</em></p>'
          )

          payload = {
              "title":   title,
              "type":    "note",
              "source":  "github-actions-diario",
              "version": 1,
              "content": {
                  "type": "html",
                  "data": content,
              },
          }

          with open("/tmp/note_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)

          # Exportar o título para o log do GitHub Actions
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"title={title}\n")

          print(f"✅ Payload gerado: {title}")
          PYEOF

      - name: 📬 Enviar nota para o Notesnook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://inbox.notesnook.com/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.NOTESNOOK_INBOX_API_KEY }}" \
            --data-binary @/tmp/note_payload.json)

          echo "Status HTTP: $HTTP_STATUS"
          echo "Resposta: $(cat /tmp/response.json)"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Nota enviada com sucesso!"
          else
            echo "❌ Falha ao enviar nota. Status: $HTTP_STATUS"
            exit 1
          fi
