name: Diário Automático

on:
  schedule:
    # 6:00 AM em America/Fortaleza (UTC-3) equivale a 9:00 AM em UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  enviar-nota:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar conteúdo e enviar para o Notesnook
        env:
          # Usando o novo nome configurado em Repository Secrets
          NOTESNOOK_TOKEN: ${{ secrets.NOTESNOOK_DIARIO_TOKEN }} 
        run: |
          export TZ="America/Fortaleza"

          DOWS=("Domingo" "Segunda-feira" "Terça-feira" "Quarta-feira" "Quinta-feira" "Sexta-feira" "Sábado")
          MONTHS=("janeiro" "fevereiro" "março" "abril" "maio" "junho" "julho" "agosto" "setembro" "outubro" "novembro" "dezembro")

          DOW_INDEX=$(date +%w)
          DAY=$(date +%d)
          MONTH_INDEX=$(( $(date +%m) - 1 ))
          YEAR=$(date +%Y)

          TITLE="${DOWS[$DOW_INDEX]}, $DAY de ${MONTHS[$MONTH_INDEX]} de $YEAR"

          CONTENT="<h1>📓 ${DOWS[$DOW_INDEX]}</h1><p><strong>$DAY de ${MONTHS[$MONTH_INDEX]} de $YEAR</strong></p><hr><h2>🧠 Clareza Mental (Brain Dump)</h2><p>O que está ocupando espaço na minha mente agora? (Escreva livremente e sem filtros...)</p><p><br></p><p><br></p><h2>💡 O que funcionou bem hoje?</h2><p>Uma pequena vitória, um aprendizado ou algo pelo qual sou grato:</p><p><br></p><p><br></p><h2>🎯 Intenção & Foco</h2><p>Qual é a principal coisa que merece minha atenção ou o que posso melhorar nas próximas horas?</p><p><br></p><hr><p><em>\"A vida é o que nossos pensamentos a fazem.\" — Marco Aurélio</em></p>"

          # Envia o JSON para a Inbox API
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://inbox.notesnook.com/ \
            -H "Content-Type: application/json" \
            -H "Authorization: $NOTESNOOK_TOKEN" \
            -d "$(jq -n \
              --arg title "$TITLE" \
              --arg content "$CONTENT" \
              '{
                title: $title,
                type: "note",
                source: "github-actions-diario",
                version: 1,
                content: {
                  type: "html",
                  data: $content
                }
              }')")

          echo "Status HTTP: $HTTP_STATUS"
          echo "Resposta: $(cat /tmp/response.json)"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Nota '${TITLE}' enviada com sucesso!"
          else
            echo "❌ Falha ao enviar nota. Status: $HTTP_STATUS"
            exit 1
          fi
