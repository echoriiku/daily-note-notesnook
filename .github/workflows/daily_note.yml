name: Diário Automático

on:
  schedule:
    # 6:00 AM em America/Fortaleza (UTC-3) equivale a 9:00 AM em UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você rode manualmente pelo painel do GitHub para testar

jobs:
  enviar-nota:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar conteúdo e enviar para o Notesnook
        env:
          # Dica: Guarde seu token no menu Settings > Secrets and variables > Actions do repositório
          NOTESNOOK_TOKEN: ${{ secrets.NOTESNOOK_INBOX_API_KEY }} 
        run: |
          # Força o fuso horário de Fortaleza para gerar a data correta
          export TZ="America/Fortaleza"

          # Arrays para traduzir a data para português nativo
          DOWS=("Domingo" "Segunda-feira" "Terça-feira" "Quarta-feira" "Quinta-feira" "Sexta-feira" "Sábado")
          MONTHS=("janeiro" "fevereiro" "março" "abril" "maio" "junho" "julho" "agosto" "setembro" "outubro" "novembro" "dezembro")

          DOW_INDEX=$(date +%w)
          DAY=$(date +%d)
          MONTH_INDEX=$(( $(date +%m) - 1 ))
          YEAR=$(date +%Y)

          # Monta o título dinâmico (Ex: Sexta-feira, 26 de junho de 2026)
          TITLE="${DOWS[$DOW_INDEX]}, $DAY de ${MONTHS[$MONTH_INDEX]} de $YEAR"

          # O segredo aqui foi escapar as aspas internas usando \" para não quebrar o Bash
          CONTENT="<h1>📓 ${DOWS[$DOW_INDEX]}</h1><p><strong>$DAY de ${MONTHS[$MONTH_INDEX]} de $YEAR</strong></p><hr><p>🔍 <em>Examine a sua própria trajetória.</em> Se você fosse um observador externo da sua vida, o que veria agora? (Reflexão #178)</p><h2>Faísca criativa 💡</h2><p>Se a minha mente fosse um quarto, como ela estaria arrumada hoje?</p><p><br></p><h2>O que está indo bem?</h2><p>O que me dá energia e como posso acessar isso mais tarde?</p><p><br></p><hr><p><em>\"A vida não examinada não vale a pena ser vivida.\" — Sócrates</em></p>"

          # Envia o JSON para a Inbox API do Notesnook de forma segura usando o jq
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://inbox.notesnook.com/ \
            -H "Content-Type: application/json" \
            -H "Authorization: $NOTESNOOK_TOKEN" \
            -d "$(jq -n \
              --arg title "$TITLE" \
              --arg content "$CONTENT" \
              '{
                title: $title,
                type: "note",
                source: "github-actions-diario",
                version: 1,
                content: {
                  type: "html",
                  data: $content
                }
              }')")

          echo "Status HTTP: $HTTP_STATUS"
          echo "Resposta: $(cat /tmp/response.json)"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Nota '${TITLE}' enviada com sucesso!"
          else
            echo "❌ Falha ao enviar nota. Status: $HTTP_STATUS"
            exit 1
          fi
